<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Gallery Lightbox</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f4f4;
margin:0;
text-align:center;
}

h1{
background:#333;
color:white;
padding:15px;
margin:0;
}

.gallery{
display:grid;
grid-template-columns: repeat(3, 1fr);
gap:15px;
padding:20px;
width:80%;
margin:auto;
}

.gallery img{
width:100%;
height:200px;
object-fit:cover;
cursor:pointer;
border-radius:10px;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* Lightbox */

.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.lightbox img{
width:60%;
border-radius:10px;
}

.close{
position:absolute;
top:20px;
right:40px;
font-size:35px;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<h1>🖼️ Image Gallery</h1>

<div class="gallery">

<img src="https://picsum.photos/id/1015/400/300" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/1016/400/300" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/1018/400/300" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/1020/400/300" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/1024/400/300" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/1027/400/300" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/1035/400/300" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/1038/400/300" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/1043/400/300" onclick="openLightbox(this)">

</div>

<div class="lightbox" id="lightbox">
<span class="close" onclick="closeLightbox()">×</span>
<img id="lightbox-img">
</div>

<script>

function openLightbox(img){
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightbox-img").src=img.src;
}

function closeLightbox(){
document.getElementById("lightbox").style.display="none";
}

</script>

</body>
</html>imagery
