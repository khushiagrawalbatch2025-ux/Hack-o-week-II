<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Online Product List</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f4f4;
}

header{
background:#2874f0;
color:white;
padding:15px;
text-align:center;
font-size:28px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.product{
background:white;
width:220px;
margin:15px;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
transition:0.3s;
}

.product:hover{
transform:scale(1.05);
}

.product img{
width:100%;
height:150px;
}

.price{
color:green;
font-size:18px;
font-weight:bold;
}

button{
background:#ff9f00;
border:none;
padding:10px;
color:white;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#fb641b;
}

</style>

</head>

<body>

<header>
🛒 Online Product Store
</header>

<div class="container">

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Wireless Headphones</h3>
<p class="price">₹999</p>
<button>Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Smart Watch</h3>
<p class="price">₹1499</p>
<button>Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Bluetooth Speaker</h3>
<p class="price">₹799</p>
<button>Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Mobile Phone</h3>
<p class="price">₹12999</p>
<button>Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Laptop</h3>
<p class="price">₹45999</p>
<button>Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Power Bank</h3>
<p class="price">₹699</p>
<button>Add to Cart</button>
</div>

</div>

</body>
</html>
