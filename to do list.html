<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aesthetic To-Do List</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins', sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)),
url("https://images.unsplash.com/photo-1506784983877-45594efa4cbe");
background-size:cover;
background-position:center;
}

.container{
background:rgba(255,255,255,0.9);
padding:30px;
border-radius:15px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
text-align:center;
}

.container h1{
margin-bottom:20px;
color:#333;
}

.input-section{
display:flex;
gap:10px;
margin-bottom:20px;
}

input{
flex:1;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
outline:none;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#6c63ff;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#574fd6;
}

ul{
list-style:none;
}

li{
background:#f2f2f2;
margin:8px 0;
padding:10px;
border-radius:8px;
display:flex;
justify-content:space-between;
align-items:center;
}

li button{
background:#ff4d4d;
padding:5px 8px;
font-size:12px;
}

li button:hover{
background:#e60000;
}

.footer-img{
margin-top:15px;
}

.footer-img img{
width:100%;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>✨ My To-Do List</h1>

<div class="input-section">
<input type="text" id="taskInput" placeholder="Add your task...">
<button onclick="addTask()">Add</button>
</div>

<ul id="taskList"></ul>

<div class="footer-img">
<img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c" alt="workspace">
</div>

</div>

<script>

function addTask(){

let input=document.getElementById("taskInput");
let task=input.value;

if(task===""){
alert("Please enter a task");
return;
}

let li=document.createElement("li");
li.innerHTML = task + ' <button onclick="removeTask(this)">Delete</button>';

document.getElementById("taskList").appendChild(li);

input.value="";
}

function removeTask(btn){
btn.parentElement.remove();
}

</script>

</body>
</html>
